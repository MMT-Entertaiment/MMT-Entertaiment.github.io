<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connexion...</title>
</head>
<body>
    <script>
        // Récupérer le code d'autorisation
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        if (code) {
            // Sauvegarder le code pour l'utiliser plus tard
            localStorage.setItem('discord_code', code);
            
            // Pour maintenant, on va extraire un token simple
            // Note: En production, tu ferais un appel serveur
            localStorage.setItem('discord_token', 'token_placeholder');
            
            // Rediriger vers le dashboard
            window.location.href = 'dashboard.html';
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
